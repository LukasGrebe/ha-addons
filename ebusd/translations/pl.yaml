configuration:
  device:
    name: Adapter USB eBUS (--device)
    description: "Wybierz adapter USB/szeregowy eBUS. Dla protokołu wysokiej prędkości (enh:) użyj network_device."
  network_device:
    name: Adapter sieciowy / protokół rozszerzony (--device)
    description: "Pełny ciąg urządzenia z prefiksem protokołu, np. ens:192.168.1.1:9999, enh:/dev/ttyUSB0 lub mdns: dla automatycznego wykrywania."
  commandline_options:
    name: Dodatkowe opcje ebusd (jedna flaga na wpis)
    description: "Flagi CLI ebusd, jedna na wpis. --foreground, --updatecheck=off, --mqtthost/port/user/pass i --mqttint są wstępnie skonfigurowane."
    options:
      - "--mqttjson"
      - "--scanconfig"
      - "--pollinterval=30"
      - "--httpport=8889"
      - "--log=bus:debug"
      - "--log=all:notice"
      - "--readonly"
      - "--configlang=pl"
      - "--configpath=/config/"
      - "--mqtttopic=myheating"
      - "--mqttretain"
