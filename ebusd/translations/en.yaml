configuration:
  device:
    name: USB eBUS adapter (--device)
    description: >
      Select a USB/serial eBUS adapter. HA shows detected TTY devices on the host.
      For enhanced-speed protocol (enh:/dev/ttyUSB0), use network_device instead —
      the picker gives the raw path only, not the protocol prefix.
  network_device:
    name: Network / enhanced-protocol adapter (--device)
    description: >
      Full ebusd device string including protocol prefix. Examples:
      mdns: (mDNS auto-discovery, default when left blank),
      ens:192.168.1.1:9999 or enh:192.168.1.1:9999 (enhanced high-speed/normal-speed),
      udp:192.168.1.1:9999 (plain UDP),
      enh:/dev/ttyUSB0 (enhanced-speed USB).
      Takes precedence over the USB picker if both are set.
  commandline_options:
    name: Additional ebusd options
    description: >
      Pass any ebusd CLI flag not set automatically (see below for what is pre-configured).
      Full reference: https://github.com/john30/ebusd/wiki/2.-Run

      Pre-configured by this app (override by repeating the flag here):
        --updatecheck=off     HA handles update notifications
        --mqttjson            JSON format required for HA MQTT discovery
        --mqttint=/config/mqtt-hassio.cfg  MQTT integration config

      Managed internally, cannot be overridden:
        --foreground          required for HA process management
        --mqtthost/port/user/pass  auto-configured from the HA Mosquitto broker

      Examples:
        --scanconfig=full --configpath=/config/ebusd-configuration/latest/en
        --pollinterval=10 --httpport=8889 --log=bus:debug
        --updatecheck=on --mqttint=/config/my-custom.cfg
