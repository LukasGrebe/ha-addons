name: eBUSd
# version is the single source of truth for the upstream release.
# HA Supervisor reads this from git to show the installed version and update badge.
# update-ebusd.yml bumps this and the Dockerfile FROM tag together in each version PR.
version: "26.1.0"
slug: ebusd
description: >
  Run ebusd — a daemon for communicating with eBUS devices (heating systems connected
  to a 2-wire energy bus). A transparent wrapper of john30/ebusd; tracks upstream
  releases automatically. USB and network eBUS adapters supported.
url: https://github.com/john30/ebusd
arch:
  - armhf
  - armv7
  - aarch64
  - amd64
image: "ghcr.io/lukasgrebe/ha-addon-ebusd-{arch}"
init: false
startup: services
services:
  - mqtt:need
uart: true
map:
  - addon_config:rw
ports:
  8888/tcp: null
  8889/tcp: null
ports_description:
  8888/tcp: eBUSd TCP command port
  8889/tcp: eBUSd HTTP port (set --httpport=8889 in commandline_options to enable)
schema:
  device: "device(subsystem=tty)?"
  network_device: "str?"
  commandline_options: "str?"
